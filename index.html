<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siri Board | Anonymous Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --neon-accent: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --dark-bg: #0f172a;
            --text-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(118, 75, 162, 0.2) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(0, 242, 254, 0.1) 0, transparent 50%);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Header Section --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
        }

        .hamburger { display: none; cursor: pointer; }

        /* --- Main Layout --- */
        .container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        /* --- Form Section --- */
        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px;
            color: white;
            resize: none;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--neon-accent);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-counter { font-size: 0.8rem; color: #94a3b8; }

        .btn-submit {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .btn-submit:active { transform: scale(0.95); }

        .shake { animation: shake 0.5s; }

        /* --- Message Cards --- */
        #message-board {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s ease;
            animation: fadeInUp 0.6s ease backwards;
        }

        .msg-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .msg-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
            background: #2d3748;
            border: 2px solid var(--neon-accent);
        }

        .author-info h4 { font-size: 0.95rem; font-weight: 600; }
        .author-info span { font-size: 0.75rem; color: #94a3b8; }

        .msg-body {
            font-size: 1rem;
            color: #cbd5e1;
            word-wrap: break-word;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            box-shadow: 0 0 5px #10b981;
        }

        /* --- Toast Notification --- */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
        }

        .toast {
            background: var(--primary-gradient);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none;
            animation: slideUp 0.4s ease;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 0.8rem;
        }

        /* --- Keyframes --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .nav-menu { display: none; }
            .hamburger { display: block; }
            .container { margin-top: 80px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SIRI BOARD</div>
        <nav class="nav-menu">
            <a href="#" style="color: white; text-decoration: none;">Home</a>
            <a href="#" style="color: white; text-decoration: none;">Explore</a>
        </nav>
        <div class="hamburger"><i class="fas fa-bars"></i></div>
    </header>

    <div class="container">
        <section class="input-card">
            <h3 style="margin-bottom: 15px;">Andika siri yako...</h3>
            <textarea id="messageInput" rows="4" placeholder="Unawaza nini leo?" maxlength="280"></textarea>
            <div class="form-footer">
                <span class="char-counter"><span id="count">0</span>/280</span>
                <button class="btn-submit" onclick="postMessage()">
                    Tuma Message <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                </button>
            </div>
        </section>

        <div id="message-board">
            </div>
    </div>

    <div id="toast-container">
        <div id="toast" class="toast">Hongera, message yako imetumwa! 🚀</div>
    </div>

    <footer>
        <p>&copy; 2026 Siri Board. Kila kitu ni siri hapa.</p>
    </footer>

    <script>
        // --- 1. Dummy Data Source ---
        // Katika production, badilisha hii iwe fetch() kutoka Google Sheets JSON API
        let messages = [
            {
                id: 1,
                author: "Mnyamwezi_01",
                text: "Maisha ni mafupi, kula vizuri na furahia kila sekunde!",
                timestamp: "2 mins ago",
                seed: "mnyamwezi"
            },
            {
                id: 2,
                author: "Anonymous_Queen",
                text: "Leo nimepata kazi mpya! Naishukuru sana hii platform kwa kunipa ujasiri wa kuongea.",
                timestamp: "1 hour ago",
                seed: "queen"
            },
            {
                id: 3,
                author: "Techie_Boi",
                text: "Designing interactive UI is the best feeling ever! #Glassmorphism",
                timestamp: "3 hours ago",
                seed: "techie"
            }
        ];

        const board = document.getElementById('message-board');
        const input = document.getElementById('messageInput');
        const counter = document.getElementById('count');
        const toast = document.getElementById('toast');

        // --- 2. Live Character Counter ---
        input.addEventListener('input', () => {
            counter.innerText = input.value.length;
        });

        // --- 3. Render Messages Function ---
        function renderMessages(data) {
            board.innerHTML = ""; // Clear board
            data.forEach((msg, index) => {
                const card = document.createElement('div');
                card.className = "msg-card";
                card.style.animationDelay = `${index * 0.1}s`; // Staggered animation
                
                // Using DiceBear for dynamic avatars
                const avatarUrl = `https://api.dicebear.com/7.x/bottts/svg?seed=${msg.seed}`;

                card.innerHTML = `
                    <div class="msg-header">
                        <img src="${avatarUrl}" alt="avatar" class="avatar">
                        <div class="author-info">
                            <h4>${msg.author} <span class="status-dot"></span></h4>
                            <span>${msg.timestamp}</span>
                        </div>
                    </div>
                    <div class="msg-body">
                        ${msg.text}
                    </div>
                `;
                board.appendChild(card);
            });
        }

        // --- 4. Post New Message (Logic) ---
        function postMessage() {
            const text = input.value.trim();
            
            if (text === "") {
                input.parentElement.classList.add('shake');
                setTimeout(() => input.parentElement.classList.remove('shake'), 500);
                return;
            }

            // Mimicking API Post
            const newMessage = {
                id: Date.now(),
                author: "User_" + Math.floor(Math.random() * 100),
                text: text,
                timestamp: "Just now",
                seed: text.substring(0, 5) // Use part of text as avatar seed
            };

            // Add to the beginning of array
            messages.unshift(newMessage);
            
            // Clear input
            input.value = "";
            counter.innerText = "0";

            // Update UI
            renderMessages(messages);
            showToast();
        }

        // --- 5. Toast Notification Logic ---
        function showToast() {
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }

        // --- 6. Auto-Update Simulation ---
        // Hii ina-simulate 'live feed' kila baada ya sekunde 10
        setInterval(() => {
            console.log("Checking for new messages...");
            // Hapa ungeweza kuweka fetch() yako
        }, 10000);

        // Initial Render
        renderMessages(messages);
    </script>
</body>
</html>

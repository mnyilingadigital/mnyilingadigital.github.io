<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnyilinga Shop - Nunua kwa Urahisi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f2f2f2; color: #333; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- HEADER (Fixed/Sticky Top) --- */
        .header-container { position: sticky; top: 0; z-index: 1000; background-color: #ff6a00; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .top-bar { background-color: #e65c00; color: white; font-size: 12px; padding: 5px 5%; display: flex; justify-content: space-between; }
        .main-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; color: white; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .logo i { font-size: 32px; }

        .search-box { display: flex; flex: 1; margin: 10px 40px; height: 45px; border-radius: 25px; overflow: hidden; background: white; }
        .search-box select { border: none; background: #f9f9f9; padding: 0 15px; border-right: 1px solid #ccc; outline: none; color: #555; cursor: pointer; }
        .search-box input { flex: 1; border: none; padding: 0 15px; outline: none; font-size: 15px; }
        .search-box button { background-color: #333; color: white; border: none; padding: 0 25px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .search-box button:hover { background-color: #555; transform: scale(1.05); }

        .header-icons { display: flex; gap: 25px; align-items: center; }
        .icon-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; transition: 0.3s; }
        .icon-item:hover { color: #fff9c4; transform: scale(1.1); }
        .icon-item i { font-size: 22px; margin-bottom: 3px; }
        .icon-item span { font-size: 12px; font-weight: 500; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: #fff; color: #e65c00; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: 700; transition: 0.2s; }

        .bottom-nav { background-color: #fff; border-bottom: 1px solid #ddd; padding: 10px 5%; display: flex; gap: 20px; font-size: 14px; font-weight: 500; color: #444; flex-wrap: wrap; }
        .bottom-nav a:hover { color: #ff6a00; }

        /* --- HERO SECTION --- */
        .hero { display: flex; padding: 20px 5%; gap: 20px; flex-wrap: wrap; }
        .sidebar-categories { background: white; width: 250px; border-radius: 8px; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .sidebar-categories li { padding: 12px 20px; border-bottom: 1px solid #f1f1f1; cursor: pointer; transition: 0.3s; }
        .sidebar-categories li:hover { background-color: #fff3e6; color: #ff6a00; padding-left: 25px; }

        .hero-banner { flex: 1; border-radius: 8px; color: white; display: flex; flex-direction: column; justify-content: center; padding: 40px; background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80'); background-size: cover; background-position: center; position: relative; transition: 0.3s; }
        .hero-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); border-radius: 8px; }
        .hero-banner:hover::before { background: rgba(0,0,0,0.35); }
        .hero-content { position: relative; z-index: 1; }
        .hero-content h1 { font-size: 40px; margin-bottom: 10px; transition: 0.3s; }
        .hero-content p { font-size: 18px; margin-bottom: 20px; }
        .btn-shop { background: #ff6a00; color: white; padding: 12px 25px; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-shop:hover { background: #e65c00; transform: scale(1.1); }

        /* --- PRODUCT GRID --- */
        .section-title { padding: 30px 5% 10px; font-size: 24px; font-weight: 600; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 10px 5% 40px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; transition: 0.3s; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .product-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.2); transform: translateY(-5px); }
        .discount-badge { position: absolute; top: 10px; left: 10px; background: #e53935; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .product-img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; transition: transform 0.3s; }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-title { font-size: 14px; color: #333; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.3s; }
        .product-card:hover .product-title { color: #ff6a00; }
        .product-rating { color: #ffb300; font-size: 12px; margin-bottom: 8px; }
        .product-price { font-size: 18px; font-weight: 700; color: #e65c00; }
        .old-price { font-size: 12px; color: #999; text-decoration: line-through; margin-left: 5px; }
        .add-to-cart-btn { width: 100%; padding: 10px; margin-top: 15px; background: white; border: 1px solid #ff6a00; color: #ff6a00; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .product-card:hover .add-to-cart-btn { background: #ff6a00; color: white; transform: scale(1.05); }

        /* --- FOOTER --- */
        footer { background: #232f3e; color: white; padding: 40px 5% 20px; }
        .footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; border-bottom: 1px solid #444; padding-bottom: 30px; margin-bottom: 20px; }
        .footer-col h3 { font-size: 16px; margin-bottom: 15px; color: #fff; }
        .footer-col ul li { margin-bottom: 10px; font-size: 14px; color: #ccc; cursor: pointer; }
        .footer-col ul li:hover { color: white; text-decoration: underline; }
        .footer-bottom { text-align: center; font-size: 14px; color: #aaa; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .main-header { flex-direction: column; gap: 15px; }
            .search-box { margin: 0; width: 100%; }
            .hero { flex-direction: column; }
            .sidebar-categories { width: 100%; }
            .footer-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- HEADER, HERO, PRODUCTS na FOOTER kama ilivyo kwenye code yako -->

<script>
    let cartItems = 0;
    function addToCart() {
        cartItems++;
        const badge = document.getElementById('cartBadge');
        badge.innerText = cartItems;
        
        // Smooth animation
        badge.style.transition = 'transform 0.2s';
        badge.style.transform = 'scale(1.5)';
        setTimeout(() => { badge.style.transform = 'scale(1)'; }, 200);
    }
</script>

</body>
</html>
